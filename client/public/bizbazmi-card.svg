<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <radialGradient id="wash1" cx="20%" cy="15%" r="55%">
      <stop offset="0%" stop-color="#cfd9b4" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#cfd9b4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="wash2" cx="85%" cy="75%" r="55%">
      <stop offset="0%" stop-color="#c3cfa4" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#c3cfa4" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="env" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#66794a"/>
      <stop offset="55%" stop-color="#55663a"/>
      <stop offset="100%" stop-color="#3d4a29"/>
    </linearGradient>
    <radialGradient id="wax" cx="38%" cy="32%" r="75%">
      <stop offset="0%" stop-color="#e9cf8f"/>
      <stop offset="45%" stop-color="#c99d4e"/>
      <stop offset="100%" stop-color="#93662a"/>
    </radialGradient>
  </defs>

  <rect width="800" height="600" fill="#e9ecda"/>
  <rect width="800" height="600" fill="url(#wash1)"/>
  <rect width="800" height="600" fill="url(#wash2)"/>

  <!-- envelope with soft shadow -->
  <ellipse cx="400" cy="470" rx="250" ry="26" fill="#3d4a29" opacity="0.18"/>
  <g transform="translate(180,170)">
    <rect x="0" y="0" width="440" height="290" rx="14" fill="url(#env)"/>
    <path d="M0 18 L220 168 L440 18" fill="none" stroke="#2e3a1e" stroke-width="4" opacity="0.8"/>
    <path d="M0 282 L164 162 M440 282 L276 162" fill="none" stroke="#2e3a1e" stroke-width="3" opacity="0.5"/>
  </g>

  <!-- wax seal -->
  <g transform="translate(348,286)">
    <path d="M52 2 c9 -2 13 4 21 4 c8 0 12 7 11 14 c-1 7 6 10 6 18 c0 8 -7 11 -6 18 c1 7 -3 14 -11 14 c-8 0 -12 7 -21 5 c-9 2 -13 -5 -21 -5 c-8 0 -12 -7 -11 -14 c1 -7 -6 -10 -6 -18 c0 -8 7 -11 6 -18 c-1 -7 3 -14 11 -14 c8 0 12 -6 21 -4 z"
      fill="url(#wax)" stroke="#7d5522" stroke-width="1.5"/>
    <circle cx="52" cy="52" r="30" fill="none" stroke="#7d5522" stroke-opacity="0.55" stroke-width="1.6"/>
    <circle cx="52" cy="52" r="34" fill="none" stroke="#f3e0ae" stroke-opacity="0.5" stroke-width="1.2"/>
    <text x="52" y="66" text-anchor="middle" font-size="40" fill="#5d3f17" font-family="'Great Vibes','Snell Roundhand',cursive">N</text>
  </g>

  <!-- calla lilies, top-left -->
  <g fill="none" stroke="#55663a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <g transform="translate(70,40) scale(1.5)">
      <path d="M22 96 C 20 70 20 52 22 40"/>
      <path d="M22 40 C 8 36 6 18 16 6 c 4 8 8 10 12 12 c -2 -8 0 -14 4 -16 c 8 10 8 30 -10 38 z" fill="#fbf9ef"/>
      <path d="M22 36 v-14" stroke="#b3893e" stroke-width="4"/>
    </g>
    <g transform="translate(130,20) scale(1.2) rotate(14)">
      <path d="M22 96 C 20 70 20 52 22 40"/>
      <path d="M22 40 C 8 36 6 18 16 6 c 4 8 8 10 12 12 c -2 -8 0 -14 4 -16 c 8 10 8 30 -10 38 z" fill="#fbf9ef"/>
      <path d="M22 36 v-14" stroke="#b3893e" stroke-width="4"/>
    </g>
  </g>

  <!-- trailing amaranth, left -->
  <g stroke="#55663a" stroke-width="2.5" fill="none" opacity="0.65" stroke-linecap="round">
    <path d="M60 190 q-6 120 6 240"/>
    <path d="M84 200 q4 130 -4 260"/>
  </g>

  <!-- title -->
  <text x="400" y="540" text-anchor="middle" font-size="44" fill="#3d4a29" font-family="'Great Vibes','Snell Roundhand',cursive">Biz Bazmi</text>
</svg>
